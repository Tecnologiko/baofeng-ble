<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baofeng CHIRP Clone Controller</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #222; 
            color: #fff; 
        }
        .btn-container {
            display: block;
            margin: 0 auto;
            max-width: 400px;
        }
        button { 
            padding: 15px 25px; 
            font-size: 16px; 
            margin: 8px 0; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
        }
        .btn-connect { background-color: #28a745; color: white; }
        .btn-action { background-color: #dc3545; color: white; }
        
        #log { 
            background: #000; 
            color: #0f0; 
            padding: 15px; 
            text-align: left; 
            height: 320px; 
            overflow-y: scroll; 
            border-radius: 5px; 
            font-family: monospace; 
            font-size: 13px;
            margin: 20px auto;
            max-width: 500px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <h2>Baofeng BT-1AD (CHIRP Next Engine)</h2>
    <p>Sincronizzazione automatica basata sul protocollo CHIRP.</p>
    
    <div class="btn-container">
        <button class="btn-connect" onclick="connettiBluetooth()">1. Connetti Dongle</button>
        <button class="btn-action" onclick="avviaFlussoChirp()">2. Avvia Sblocco e Lettura Completa</button>
    </div>
    
    <h3>Log Comunicazione:</h3>
    <div id="log">In attesa di connessione...</div>

    <script>
        let dispositivoBle = null;
        let caratteristicaScrittura = null;
        let caratteristicaLettura = null;
        let stepProtocollo = 0; 

        const SERVIZIO_UUID = '0000ff00-0000-1000-8000-00805f9b34fb';
        const CARATTERISTICA_READ_UUID = '0000ff01-0000-1000-8000-00805f9b34fb';
        const CARATTERISTICA_WRITE_UUID = '0000ff02-0000-1000-8000-00805f9b34fb';

        function stampaLog(testo) {
            const logDiv = document.getElementById('log');
            if (logDiv.innerHTML === "In attesa di connessione...") { logDiv.innerHTML = ""; }
            logDiv.innerHTML += testo + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function connettiBluetooth() {
            stampaLog("Apertura ricerca Bluetooth...");
            navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'BF_' }],
                optionalServices: [SERVIZIO_UUID]
            })
            .then(device => {
                dispositivoBle = device;
                stampaLog(`Connesso a: ${device.name}`);
                return device.gatt.connect();
            })
            .then(server => return server.getPrimaryService(SERVIZIO_UUID))
            .then(servizio => {
                servizio.getCharacteristic(CARATTERISTICA_WRITE_UUID).then(cWrite => { caratteristicaScrittura = cWrite; });
                return servizio.getCharacteristic(CARATTERISTICA_READ_UUID);
            })
            .then(cRead => {
                caratteristicaLettura = cRead;
                return caratteristicaLettura.startNotifications();
            })
            .then(() => {
                // GESTORE DELLE RISPOSTE AUTOMATICHE (Il cuore di CHIRP)
                caratteristicaLettura.addEventListener('characteristicvaluechanged', (event) => {
                    let valore = new Uint8Array(event.target.value.buffer);
                    let stringaHex = Array.from(valore).map(b => b.toString(16).padStart(2, '0')).join(' ').toUpperCase();
                    stampaLog(`<span style="color: #00ffcc;"><- Radio: ${stringaHex}</span>`);
                    
                    // Macchina a stati per seguire CHIRP
                    gestisciRispostaRadio(valore);
                });
                stampaLog("<span style='color: #00ff00;'>PRONTO. Accendi la radio e premi il pulsante ROSSO.</span>");
            })
            .catch(error => { stampaLog("<span style='color: red;'>ERRORE: " + error + "</span>"); });
        }

        async function avviaFlussoChirp() {
            if (!caratteristicaScrittura) { return stampaLog("Errore: Non sei connesso!"); }
            stepProtocollo = 1;
            stampaLog("-> [CHIRP Step 1] Invio Stretta di mano (PROGRAM)...");
            const payload = new Uint8Array([0x06, 0x50, 0x52, 0x4F, 0x47, 0x52, 0x41, 0x4D]);
            await caratteristicaScrittura.writeValue(payload);
        }

        async function gestisciRispostaRadio(dati) {
            // STEP 1: La radio risponde al PROGRAM con ACK (0x06)
            if (stepProtocollo === 1 && dati[0] === 0x06) {
                stampaLog("<- ACK Ricevuto. Attesa 100ms come da specifiche CHIRP...");
                stepProtocollo = 2;
                
                setTimeout(async () => {
                    stampaLog("-> [CHIRP Step 2] Invio secondo ACK (0x06)...");
                    await caratteristicaScrittura.writeValue(new Uint8Array([0x06]));
                }, 100);
                return;
            }

            // STEP 2: Dopo il secondo ACK la radio sputa il firmware (es. inizia con lettere o dati identificativi)
            if (stepProtocollo === 2) {
                stampaLog("<- Identificativo firmware ricevuto. Invio terzo ACK di conferma...");
                stepProtocollo = 3;
                
                setTimeout(async () => {
                    await caratteristicaScrittura.writeValue(new Uint8Array([0x06]));
                    stampaLog("-> [CHIRP Step 3] Terzo ACK inviato. Richiesta lettura blocco memoria 0x0000 (64 byte)...");
                    
                    // Invio comando finale di lettura standard CHIRP Next (R + 00 + 00 + 40)
                    setTimeout(async () => {
                        const payloadLettura = new Uint8Array([0x52, 0x00, 0x00, 0x40]);
                        await caratteristicaScrittura.writeValue(payloadLettura);
                    }, 50);
                }, 100);
                return;
            }
        }
    </script>
</body>
</html>
